name: Build and Deploy Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet tool restore

      # Pack local NuGet dependencies in dependency order
      - run: mkdir -p local-packages
      - name: Pack Contracts
        run: |
          dotnet pack src/PhysicsSandbox.Shared.Contracts/PhysicsSandbox.Shared.Contracts.csproj -c Release -o local-packages
      - name: Pack ServiceDefaults
        run: |
          dotnet pack src/PhysicsSandbox.ServiceDefaults/PhysicsSandbox.ServiceDefaults.csproj -c Release -o local-packages
      - name: Pack PhysicsClient
        run: |
          dotnet pack src/PhysicsClient/PhysicsClient.fsproj -c Release -o local-packages
      - name: Build Scripting (for fsdocs)
        run: dotnet build src/PhysicsSandbox.Scripting/PhysicsSandbox.Scripting.fsproj -c Release

      - run: dotnet fsdocs build --clean --properties Configuration=Release
      - uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
