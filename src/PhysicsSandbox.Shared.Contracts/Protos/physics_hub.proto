syntax = "proto3";

package physics_sandbox;

option csharp_namespace = "PhysicsSandbox.Shared.Contracts";

// ─── Client/Viewer-facing service ───────────────────────────────────────────

service PhysicsHub {
  // Client sends a simulation command (add body, apply force, etc.)
  rpc SendCommand (SimulationCommand) returns (CommandAck);

  // Client sends a view command (camera, wireframe, zoom)
  rpc SendViewCommand (ViewCommand) returns (CommandAck);

  // Client/Viewer subscribes to simulation state updates.
  // Late joiners receive the most recent cached state as the first message.
  rpc StreamState (StateRequest) returns (stream SimulationState);

  // Server streams view commands to the viewer.
  // Viewer subscribes to receive camera, wireframe, and zoom commands
  // forwarded from the client via SendViewCommand.
  rpc StreamViewCommands (StateRequest) returns (stream ViewCommand);

  // Audit stream: broadcasts every incoming command to subscribers.
  // No late-joiner backfill — commands are ephemeral.
  rpc StreamCommands (StateRequest) returns (stream CommandEvent);

  // Batch RPCs: submit multiple commands in a single request
  rpc SendBatchCommand (BatchSimulationRequest) returns (BatchResponse);
  rpc SendBatchViewCommand (BatchViewRequest) returns (BatchResponse);

  // Metrics: query service performance counters and pipeline timings
  rpc GetMetrics (MetricsRequest) returns (MetricsResponse);

  // Mesh cache: on-demand geometry fetch (separate from state stream)
  rpc FetchMeshes (MeshRequest) returns (MeshResponse);

  // Physics queries
  rpc Raycast (RaycastRequest) returns (RaycastResponse);
  rpc RaycastBatch (RaycastBatchRequest) returns (RaycastBatchResponse);
  rpc SweepCast (SweepCastRequest) returns (SweepCastResponse);
  rpc SweepCastBatch (SweepCastBatchRequest) returns (SweepCastBatchResponse);
  rpc Overlap (OverlapRequest) returns (OverlapResponse);
  rpc OverlapBatch (OverlapBatchRequest) returns (OverlapBatchResponse);
}

// ─── Simulation-facing service ──────────────────────────────────────────────

service SimulationLink {
  // Simulation connects and establishes a bidirectional stream:
  //   - Simulation pushes SimulationState upstream
  //   - Server pushes SimulationCommand downstream
  // Only one simulation may be connected at a time (ALREADY_EXISTS if occupied).
  rpc ConnectSimulation (stream SimulationState) returns (stream SimulationCommand);
}

// ─── Messages ───────────────────────────────────────────────────────────────

message SimulationCommand {
  oneof command {
    AddBody add_body = 1;
    ApplyForce apply_force = 2;
    SetGravity set_gravity = 3;
    StepSimulation step = 4;
    PlayPause play_pause = 5;
    RemoveBody remove_body = 6;
    ApplyImpulse apply_impulse = 7;
    ApplyTorque apply_torque = 8;
    ClearForces clear_forces = 9;
    ResetSimulation reset = 10;
    AddConstraint add_constraint = 11;
    RemoveConstraint remove_constraint = 12;
    RegisterShape register_shape = 13;
    UnregisterShape unregister_shape = 14;
    SetCollisionFilter set_collision_filter = 15;
    QueryRequest query_request = 16;
    SetBodyPose set_body_pose = 17;
  }
}

message QueryRequest {
  string correlation_id = 1;
  oneof query {
    RaycastRequest raycast = 2;
    SweepCastRequest sweep_cast = 3;
    OverlapRequest overlap = 4;
  }
}

message QueryResponse {
  string correlation_id = 1;
  oneof response {
    RaycastResponse raycast = 2;
    SweepCastResponse sweep_cast = 3;
    OverlapResponse overlap = 4;
  }
}

message ResetSimulation {}

message AddBody {
  string id = 1;
  Vec3 position = 2;
  Vec3 velocity = 3;
  double mass = 4;
  Shape shape = 5;
  MaterialProperties material = 6;
  Color color = 7;
  BodyMotionType motion_type = 8;
  uint32 collision_group = 9;
  uint32 collision_mask = 10;
  Vec3 angular_velocity = 11;
  Vec4 orientation = 12;
}

message ApplyForce {
  string body_id = 1;
  Vec3 force = 2;
}

message SetGravity {
  Vec3 gravity = 1;
}

message StepSimulation {
  double delta_time = 1;
}

message PlayPause {
  bool running = 1;
}

message ViewCommand {
  oneof command {
    SetCamera set_camera = 1;
    ToggleWireframe toggle_wireframe = 2;
    SetZoom set_zoom = 3;
  }
}

message SetCamera {
  Vec3 position = 1;
  Vec3 target = 2;
  Vec3 up = 3;
}

message ToggleWireframe {
  bool enabled = 1;
}

message SetZoom {
  double level = 1;
}

message SimulationState {
  repeated Body bodies = 1;
  double time = 2;
  bool running = 3;
  double tick_ms = 4;
  double serialize_ms = 5;
  repeated ConstraintState constraints = 6;
  repeated RegisteredShapeState registered_shapes = 7;
  repeated QueryResponse query_responses = 8;
  repeated MeshGeometry new_meshes = 9;
}

message Body {
  string id = 1;
  Vec3 position = 2;
  Vec3 velocity = 3;
  double mass = 4;
  Shape shape = 5;
  Vec3 angular_velocity = 6;
  Vec4 orientation = 7;
  bool is_static = 8;
  Color color = 9;
  BodyMotionType motion_type = 10;
  uint32 collision_group = 11;
  uint32 collision_mask = 12;
  MaterialProperties material = 13;
}

message Vec3 {
  double x = 1;
  double y = 2;
  double z = 3;
}

message Vec4 {
  double x = 1;
  double y = 2;
  double z = 3;
  double w = 4;
}

message RemoveBody {
  string body_id = 1;
}

message ApplyImpulse {
  string body_id = 1;
  Vec3 impulse = 2;
}

message ApplyTorque {
  string body_id = 1;
  Vec3 torque = 2;
}

message ClearForces {
  string body_id = 1;
}

// ─── Shapes ─────────────────────────────────────────────────────────────────

message Shape {
  oneof shape {
    Sphere sphere = 1;
    Box box = 2;
    Plane plane = 3;
    Capsule capsule = 4;
    Cylinder cylinder = 5;
    Triangle triangle = 6;
    ConvexHull convex_hull = 7;
    Compound compound = 8;
    MeshShape mesh = 9;
    ShapeReference shape_ref = 10;
    CachedShapeRef cached_ref = 11;
  }
}

message Sphere {
  double radius = 1;
}

message Box {
  Vec3 half_extents = 1;
}

message Plane {
  Vec3 normal = 1;
}

message Capsule {
  double radius = 1;
  double length = 2;
}

message Cylinder {
  double radius = 1;
  double length = 2;
}

message Triangle {
  Vec3 a = 1;
  Vec3 b = 2;
  Vec3 c = 3;
}

message ConvexHull {
  repeated Vec3 points = 1;
}

message CompoundChild {
  Shape shape = 1;
  Vec3 local_position = 2;
  Vec4 local_orientation = 3;
}

message Compound {
  repeated CompoundChild children = 1;
}

message MeshTriangle {
  Vec3 a = 1;
  Vec3 b = 2;
  Vec3 c = 3;
}

message MeshShape {
  repeated MeshTriangle triangles = 1;
}

message ShapeReference {
  string shape_handle = 1;
}

message CachedShapeRef {
  string mesh_id = 1;
  Vec3 bbox_min = 2;
  Vec3 bbox_max = 3;
}

// ─── Mesh Cache ────────────────────────────────────────────────────────────

message MeshGeometry {
  string mesh_id = 1;
  Shape shape = 2;
}

message MeshRequest {
  repeated string mesh_ids = 1;
}

message MeshResponse {
  repeated MeshGeometry meshes = 1;
}

message MeshFetchLog {
  repeated string requested_ids = 1;
  int32 hits = 2;
  int32 misses = 3;
  repeated string missed_ids = 4;
}

// ─── Shape Registration ─────────────────────────────────────────────────────

message RegisterShape {
  string shape_handle = 1;
  Shape shape = 2;
}

message UnregisterShape {
  string shape_handle = 1;
}

message RegisteredShapeState {
  string shape_handle = 1;
  Shape shape = 2;
}

// ─── Color & Material ───────────────────────────────────────────────────────

message Color {
  double r = 1;
  double g = 2;
  double b = 3;
  double a = 4;
}

message MaterialProperties {
  double friction = 1;
  double max_recovery_velocity = 2;
  double spring_frequency = 3;
  double spring_damping_ratio = 4;
}

// ─── Body Motion Type ───────────────────────────────────────────────────────

enum BodyMotionType {
  DYNAMIC = 0;
  KINEMATIC = 1;
  STATIC = 2;
}

// ─── Constraints ────────────────────────────────────────────────────────────

message AddConstraint {
  string id = 1;
  string body_a = 2;
  string body_b = 3;
  ConstraintType type = 4;
}

message RemoveConstraint {
  string constraint_id = 1;
}

message ConstraintType {
  oneof constraint {
    BallSocketConstraint ball_socket = 1;
    HingeConstraint hinge = 2;
    WeldConstraint weld = 3;
    DistanceLimitConstraint distance_limit = 4;
    DistanceSpringConstraint distance_spring = 5;
    SwingLimitConstraint swing_limit = 6;
    TwistLimitConstraint twist_limit = 7;
    LinearAxisMotorConstraint linear_axis_motor = 8;
    AngularMotorConstraint angular_motor = 9;
    PointOnLineConstraint point_on_line = 10;
  }
}

message SpringSettings {
  double frequency = 1;
  double damping_ratio = 2;
}

message MotorConfig {
  double max_force = 1;
  double damping = 2;
}

message BallSocketConstraint {
  Vec3 local_offset_a = 1;
  Vec3 local_offset_b = 2;
  SpringSettings spring = 3;
}

message HingeConstraint {
  Vec3 local_hinge_axis_a = 1;
  Vec3 local_hinge_axis_b = 2;
  Vec3 local_offset_a = 3;
  Vec3 local_offset_b = 4;
  SpringSettings spring = 5;
}

message WeldConstraint {
  Vec3 local_offset = 1;
  Vec4 local_orientation = 2;
  SpringSettings spring = 3;
}

message DistanceLimitConstraint {
  Vec3 local_offset_a = 1;
  Vec3 local_offset_b = 2;
  double min_distance = 3;
  double max_distance = 4;
  SpringSettings spring = 5;
}

message DistanceSpringConstraint {
  Vec3 local_offset_a = 1;
  Vec3 local_offset_b = 2;
  double target_distance = 3;
  SpringSettings spring = 4;
}

message SwingLimitConstraint {
  Vec3 axis_local_a = 1;
  Vec3 axis_local_b = 2;
  double max_swing_angle = 3;
  SpringSettings spring = 4;
}

message TwistLimitConstraint {
  Vec3 local_axis_a = 1;
  Vec3 local_axis_b = 2;
  double min_angle = 3;
  double max_angle = 4;
  SpringSettings spring = 5;
}

message LinearAxisMotorConstraint {
  Vec3 local_offset_a = 1;
  Vec3 local_offset_b = 2;
  Vec3 local_axis = 3;
  double target_velocity = 4;
  MotorConfig motor = 5;
}

message AngularMotorConstraint {
  Vec3 target_velocity = 1;
  MotorConfig motor = 2;
}

message PointOnLineConstraint {
  Vec3 local_origin = 1;
  Vec3 local_direction = 2;
  Vec3 local_offset = 3;
  SpringSettings spring = 4;
}

message ConstraintState {
  string id = 1;
  string body_a = 2;
  string body_b = 3;
  ConstraintType type = 4;
}

// ─── Collision Filter ───────────────────────────────────────────────────────

message SetCollisionFilter {
  string body_id = 1;
  uint32 collision_group = 2;
  uint32 collision_mask = 3;
}

// ─── Body Pose ──────────────────────────────────────────────────────────────

message SetBodyPose {
  string body_id = 1;
  Vec3 position = 2;
  Vec4 orientation = 3;
  Vec3 velocity = 4;
  Vec3 angular_velocity = 5;
}

// ─── Physics Queries ────────────────────────────────────────────────────────

message RaycastRequest {
  Vec3 origin = 1;
  Vec3 direction = 2;
  double max_distance = 3;
  bool all_hits = 4;
  uint32 collision_mask = 5;
}

message RayHit {
  string body_id = 1;
  Vec3 position = 2;
  Vec3 normal = 3;
  double distance = 4;
}

message RaycastResponse {
  bool hit = 1;
  repeated RayHit hits = 2;
}

message RaycastBatchRequest {
  repeated RaycastRequest rays = 1;
}

message RaycastBatchResponse {
  repeated RaycastResponse results = 1;
}

message SweepCastRequest {
  Shape shape = 1;
  Vec3 start_position = 2;
  Vec4 orientation = 3;
  Vec3 direction = 4;
  double max_distance = 5;
  uint32 collision_mask = 6;
}

message SweepCastResponse {
  bool hit = 1;
  RayHit closest = 2;
}

message SweepCastBatchRequest {
  repeated SweepCastRequest sweeps = 1;
}

message SweepCastBatchResponse {
  repeated SweepCastResponse results = 1;
}

message OverlapRequest {
  Shape shape = 1;
  Vec3 position = 2;
  Vec4 orientation = 3;
  uint32 collision_mask = 4;
}

message OverlapResponse {
  repeated string body_ids = 1;
}

message OverlapBatchRequest {
  repeated OverlapRequest overlaps = 1;
}

message OverlapBatchResponse {
  repeated OverlapResponse results = 1;
}

// ─── Standard Messages ──────────────────────────────────────────────────────

message CommandAck {
  bool success = 1;
  string message = 2;
}

message StateRequest {
  // Empty — subscribes the caller to state updates.
}

message CommandEvent {
  oneof command {
    SimulationCommand simulation_command = 1;
    ViewCommand view_command = 2;
    MeshFetchLog mesh_fetch_log = 3;
  }
}

// ─── Batch messages ─────────────────────────────────────────────────────────

message BatchSimulationRequest {
  repeated SimulationCommand commands = 1;
}

message BatchViewRequest {
  repeated ViewCommand commands = 1;
}

message CommandResult {
  bool success = 1;
  string message = 2;
  int32 index = 3;
}

message BatchResponse {
  repeated CommandResult results = 1;
  double total_time_ms = 2;
}

// ─── Metrics messages ───────────────────────────────────────────────────────

message MetricsRequest {}

message ServiceMetricsReport {
  string service_name = 1;
  int64 messages_sent = 2;
  int64 messages_received = 3;
  int64 bytes_sent = 4;
  int64 bytes_received = 5;
}

message PipelineTimings {
  double simulation_tick_ms = 1;
  double state_serialization_ms = 2;
  double grpc_transfer_ms = 3;
  double viewer_render_ms = 4;
  double total_pipeline_ms = 5;
}

message MetricsResponse {
  repeated ServiceMetricsReport services = 1;
  PipelineTimings pipeline = 2;
}
