syntax = "proto3";

package physics_sandbox;

option csharp_namespace = "PhysicsSandbox.Shared.Contracts";

// ─── Client/Viewer-facing service ───────────────────────────────────────────

service PhysicsHub {
  // Client sends a simulation command (add body, apply force, etc.)
  rpc SendCommand (SimulationCommand) returns (CommandAck);

  // Client sends a view command (camera, wireframe, zoom)
  rpc SendViewCommand (ViewCommand) returns (CommandAck);

  // Client/Viewer subscribes to simulation state updates.
  // Late joiners receive the most recent cached state as the first message.
  rpc StreamState (StateRequest) returns (stream SimulationState);

  // Server streams view commands to the viewer.
  // Viewer subscribes to receive camera, wireframe, and zoom commands
  // forwarded from the client via SendViewCommand.
  rpc StreamViewCommands (StateRequest) returns (stream ViewCommand);

  // Audit stream: broadcasts every incoming command to subscribers.
  // No late-joiner backfill — commands are ephemeral.
  rpc StreamCommands (StateRequest) returns (stream CommandEvent);

  // Batch RPCs: submit multiple commands in a single request
  rpc SendBatchCommand (BatchSimulationRequest) returns (BatchResponse);
  rpc SendBatchViewCommand (BatchViewRequest) returns (BatchResponse);

  // Metrics: query service performance counters and pipeline timings
  rpc GetMetrics (MetricsRequest) returns (MetricsResponse);
}

// ─── Simulation-facing service ──────────────────────────────────────────────

service SimulationLink {
  // Simulation connects and establishes a bidirectional stream:
  //   - Simulation pushes SimulationState upstream
  //   - Server pushes SimulationCommand downstream
  // Only one simulation may be connected at a time (ALREADY_EXISTS if occupied).
  rpc ConnectSimulation (stream SimulationState) returns (stream SimulationCommand);
}

// ─── Messages ───────────────────────────────────────────────────────────────

message SimulationCommand {
  oneof command {
    AddBody add_body = 1;
    ApplyForce apply_force = 2;
    SetGravity set_gravity = 3;
    StepSimulation step = 4;
    PlayPause play_pause = 5;
    RemoveBody remove_body = 6;
    ApplyImpulse apply_impulse = 7;
    ApplyTorque apply_torque = 8;
    ClearForces clear_forces = 9;
    ResetSimulation reset = 10;
  }
}

message ResetSimulation {}

message AddBody {
  string id = 1;
  Vec3 position = 2;
  Vec3 velocity = 3;
  double mass = 4;
  Shape shape = 5;
}

message ApplyForce {
  string body_id = 1;
  Vec3 force = 2;
}

message SetGravity {
  Vec3 gravity = 1;
}

message StepSimulation {
  double delta_time = 1;
}

message PlayPause {
  bool running = 1;
}

message ViewCommand {
  oneof command {
    SetCamera set_camera = 1;
    ToggleWireframe toggle_wireframe = 2;
    SetZoom set_zoom = 3;
  }
}

message SetCamera {
  Vec3 position = 1;
  Vec3 target = 2;
  Vec3 up = 3;
}

message ToggleWireframe {
  bool enabled = 1;
}

message SetZoom {
  double level = 1;
}

message SimulationState {
  repeated Body bodies = 1;
  double time = 2;
  bool running = 3;
  double tick_ms = 4;
  double serialize_ms = 5;
}

message Body {
  string id = 1;
  Vec3 position = 2;
  Vec3 velocity = 3;
  double mass = 4;
  Shape shape = 5;
  Vec3 angular_velocity = 6;
  Vec4 orientation = 7;
  bool is_static = 8;
}

message Vec3 {
  double x = 1;
  double y = 2;
  double z = 3;
}

message Vec4 {
  double x = 1;
  double y = 2;
  double z = 3;
  double w = 4;
}

message RemoveBody {
  string body_id = 1;
}

message ApplyImpulse {
  string body_id = 1;
  Vec3 impulse = 2;
}

message ApplyTorque {
  string body_id = 1;
  Vec3 torque = 2;
}

message ClearForces {
  string body_id = 1;
}

message Shape {
  oneof shape {
    Sphere sphere = 1;
    Box box = 2;
    Plane plane = 3;
  }
}

message Sphere {
  double radius = 1;
}

message Box {
  Vec3 half_extents = 1;
}

message Plane {
  Vec3 normal = 1;
}

message CommandAck {
  bool success = 1;
  string message = 2;
}

message StateRequest {
  // Empty — subscribes the caller to state updates.
}

message CommandEvent {
  oneof command {
    SimulationCommand simulation_command = 1;
    ViewCommand view_command = 2;
  }
}

// ─── Batch messages ─────────────────────────────────────────────────────────

message BatchSimulationRequest {
  repeated SimulationCommand commands = 1;
}

message BatchViewRequest {
  repeated ViewCommand commands = 1;
}

message CommandResult {
  bool success = 1;
  string message = 2;
  int32 index = 3;
}

message BatchResponse {
  repeated CommandResult results = 1;
  double total_time_ms = 2;
}

// ─── Metrics messages ───────────────────────────────────────────────────────

message MetricsRequest {}

message ServiceMetricsReport {
  string service_name = 1;
  int64 messages_sent = 2;
  int64 messages_received = 3;
  int64 bytes_sent = 4;
  int64 bytes_received = 5;
}

message PipelineTimings {
  double simulation_tick_ms = 1;
  double state_serialization_ms = 2;
  double grpc_transfer_ms = 3;
  double viewer_render_ms = 4;
  double total_pipeline_ms = 5;
}

message MetricsResponse {
  repeated ServiceMetricsReport services = 1;
  PipelineTimings pipeline = 2;
}
